services:
  # Container 1: PHP + Seu Código (Front e Back)
  app:
    build: .
    container_name: app_sistema
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # Container 2: Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: sistema_curso
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./bd:/docker-entrypoint-initdb.d

  # Container 3: SGBD (phpMyAdmin para você gerenciar o banco)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sgbd_pma
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db